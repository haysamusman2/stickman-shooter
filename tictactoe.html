<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #mode-toggle {
      display: flex;
      background: #16213e;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 20px;
      gap: 4px;
    }

    #mode-toggle button {
      padding: 8px 22px;
      background: transparent;
      color: #a8b2d8;
      border-radius: 7px;
      font-size: 0.95rem;
      border: none;
    }

    #mode-toggle button.active {
      background: #0f3460;
      color: #fff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 20px;
      height: 1.6em;
      color: #a8b2d8;
    }

    #status.winner {
      color: #e94560;
      font-weight: bold;
    }

    #status.draw {
      color: #f4a261;
      font-weight: bold;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.x {
      color: #e94560;
    }

    .cell.o {
      color: #53d8fb;
    }

    .cell.win-cell {
      background: #0f3460;
      box-shadow: 0 0 16px rgba(233, 69, 96, 0.5);
    }

    #board.bot-thinking .cell:not(.taken) {
      cursor: wait;
    }

    #controls {
      margin-top: 28px;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    #btn-restart {
      background: #e94560;
      color: #fff;
    }

    #score {
      margin-top: 24px;
      display: flex;
      gap: 32px;
      font-size: 1rem;
      color: #a8b2d8;
    }

    .score-item span {
      font-weight: bold;
      font-size: 1.4rem;
    }

    .score-item.x-score span {
      color: #e94560;
    }

    .score-item.o-score span {
      color: #53d8fb;
    }

    .score-item.draw-score span {
      color: #f4a261;
    }
  </style>
</head>

<body>

  <h1>TIC TAC TOE</h1>

  <div id="mode-toggle">
    <button id="btn-2p" class="active" onclick="setMode('2p')">2 Players</button>
    <button id="btn-bot" onclick="setMode('bot')">vs Bot</button>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="controls">
    <button id="btn-restart">Restart</button>
  </div>

  <div id="score">
    <div class="score-item x-score"><span id="score-label-x">X</span> Wins <span id="score-x">0</span></div>
    <div class="score-item draw-score">Draws <span id="score-d">0</span></div>
    <div class="score-item o-score"><span id="score-label-o">O</span> Wins <span id="score-o">0</span></div>
  </div>

  <script>
    const WINS = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8],
      [0, 3, 6], [1, 4, 7], [2, 5, 8],
      [0, 4, 8], [2, 4, 6]
    ];

    let board, current, gameOver, scores, mode;
    mode = '2p';

    // ── Minimax ──────────────────────────────────────────────────────────────

    function getResult(b) {
      for (const [a, bx, c] of WINS) {
        if (b[a] && b[a] === b[bx] && b[a] === b[c]) return b[a];
      }
      if (b.every(Boolean)) return 'draw';
      return null;
    }

    function minimax(b, isMaximising) {
      const res = getResult(b);
      if (res === 'O') return 10;
      if (res === 'X') return -10;
      if (res === 'draw') return 0;

      let best = isMaximising ? -Infinity : Infinity;
      for (let i = 0; i < 9; i++) {
        if (b[i]) continue;
        b[i] = isMaximising ? 'O' : 'X';
        const score = minimax(b, !isMaximising);
        b[i] = null;
        best = isMaximising ? Math.max(best, score) : Math.min(best, score);
      }
      return best;
    }

    function bestMove() {
      let best = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (board[i]) continue;
        board[i] = 'O';
        const score = minimax(board, false);
        board[i] = null;
        if (score > best) { best = score; move = i; }
      }
      return move;
    }

    // ── Game logic ────────────────────────────────────────────────────────────

    function setMode(m) {
      mode = m;
      document.getElementById('btn-2p').classList.toggle('active', m === '2p');
      document.getElementById('btn-bot').classList.toggle('active', m === 'bot');
      document.getElementById('score-label-x').textContent = m === 'bot' ? 'You' : 'X';
      document.getElementById('score-label-o').textContent = m === 'bot' ? 'Bot' : 'O';
      scores = { X: 0, O: 0, D: 0 };
      updateScoreDisplay();
      init();
    }

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;

      document.getElementById('board').classList.remove('bot-thinking');
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });

      if (!scores) scores = { X: 0, O: 0, D: 0 };
      setStatus(mode === 'bot' ? 'Your turn (X)' : "Player X's turn");
    }

    function setStatus(msg, cls = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = cls;
    }

    function updateScoreDisplay() {
      document.getElementById('score-x').textContent = scores.X;
      document.getElementById('score-o').textContent = scores.O;
      document.getElementById('score-d').textContent = scores.D;
    }

    function checkWinner() {
      for (const [a, b, c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a, b, c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    function applyMove(i, player) {
      board[i] = player;
      const cell = document.querySelector(`[data-i="${i}"]`);
      cell.textContent = player;
      cell.classList.add('taken', player.toLowerCase());
    }

    function handleResult() {
      const result = checkWinner();
      if (!result) return false;

      gameOver = true;
      document.getElementById('board').classList.remove('bot-thinking');

      if (result.winner) {
        result.line.forEach(idx =>
          document.querySelector(`[data-i="${idx}"]`).classList.add('win-cell')
        );
        scores[result.winner]++;
        updateScoreDisplay();
        if (mode === 'bot') {
          setStatus(result.winner === 'X' ? 'You win!' : 'Bot wins!', 'winner');
        } else {
          setStatus(`Player ${result.winner} wins!`, 'winner');
        }
      } else {
        scores.D++;
        updateScoreDisplay();
        setStatus("It's a draw!", 'draw');
      }
      return true;
    }

    function botPlay() {
      document.getElementById('board').classList.add('bot-thinking');
      setStatus('Bot is thinking…');
      setTimeout(() => {
        if (gameOver) return;
        const move = bestMove();
        applyMove(move, 'O');
        document.getElementById('board').classList.remove('bot-thinking');
        if (!handleResult()) {
          current = 'X';
          setStatus('Your turn (X)');
        }
      }, 300);
    }

    document.getElementById('board').addEventListener('click', e => {
      const cell = e.target.closest('.cell');
      if (!cell || gameOver || cell.classList.contains('taken')) return;
      if (mode === 'bot' && current !== 'X') return;

      const i = +cell.dataset.i;
      applyMove(i, current);

      if (handleResult()) return;

      if (mode === 'bot') {
        current = 'O';
        botPlay();
      } else {
        current = current === 'X' ? 'O' : 'X';
        setStatus(`Player ${current}'s turn`);
      }
    });

    document.getElementById('btn-restart').addEventListener('click', init);

    init();
  </script>
</body>

</html>
