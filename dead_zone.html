<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dead Zone</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#111; display:flex; align-items:center; justify-content:center; min-height:100vh; }
canvas { display:block; cursor:crosshair; image-rendering:pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const CW = 900, CH = 600;
C.width = CW; C.height = CH;

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const WORLD_W = 1800, WORLD_H = 1200;
const TOTAL_LEVELS = 10;
const BOSS_LEVELS = new Set([5, 10]);

const COL = {
  bg:'#3a3020', bgTile:'#443828',
  wall:'#7a6a48', wallHi:'#9a8a68', wallSh:'#4a3a28',
  player:'#4a7a3a', playerDk:'#2d5022',
  infantry:'#7a6040', infantryDk:'#4a3820',
  tank:'#606a60', tankDk:'#384038',
  boss:'#8a3030', bossDk:'#5a1010',
  bullet:'#ffe044', enemyBullet:'#ff3333',
  hp:'#22cc44', hpLow:'#cc4422', hpBg:'#331111',
  coin:'#ffcc00', ui:'#ffffff', uiDim:'#888888',
};

const WEAPONS = [
  {name:'PISTOL',  cd:0.40, dmg:15, spd:620, spread:0.00, count:1, col:'#ffe044'},
  {name:'SMG',     cd:0.10, dmg:7,  spd:660, spread:0.08, count:1, col:'#ffaa00'},
  {name:'SHOTGUN', cd:0.65, dmg:11, spd:480, spread:0.28, count:6, col:'#ff6600'},
  {name:'SNIPER',  cd:0.90, dmg:95, spd:1500,spread:0.00, count:1, col:'#00eeff'},
];

const UPGRADE_DEFS = [
  {key:'hp',    label:'ARMOR KIT',    desc:'+40 Max HP,\nfull heal',    cost:30},
  {key:'dmg',   label:'HOT ROUNDS',   desc:'+25% bullet\ndamage',       cost:25},
  {key:'speed', label:'FAST BOOTS',   desc:'+20% movement\nspeed',      cost:20},
  {key:'ammo',  label:'AMMO CRATE',   desc:'Refill all\nweapon ammo',   cost:15},
  {key:'heal',  label:'FIELD MEDIC',  desc:'Restore\n60 HP',            cost:20},
];

// ── INPUT ─────────────────────────────────────────────────────────────────────
const keys = {};
const mouse = {x:CW/2, y:CH/2, down:false, clicked:false};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (e.code==='Digit1') tryWeapon(0);
  if (e.code==='Digit2') tryWeapon(1);
  if (e.code==='Digit3') tryWeapon(2);
  if (e.code==='Digit4') tryWeapon(3);
  if (e.code==='Escape') { if (state===ST.PLAYING) state=ST.PAUSED; else if (state===ST.PAUSED) state=ST.PLAYING; }
});
document.addEventListener('keyup', e => keys[e.code]=false);
C.addEventListener('mousemove', e => {
  const r = C.getBoundingClientRect();
  mouse.x = (e.clientX-r.left)*(CW/r.width);
  mouse.y = (e.clientY-r.top)*(CH/r.height);
});
C.addEventListener('mousedown', () => { mouse.down=true; mouse.clicked=true; });
C.addEventListener('mouseup',   () => mouse.down=false);
C.addEventListener('contextmenu', e => e.preventDefault());
function tryWeapon(i) { if (state===ST.PLAYING && P.weapons[i]) P.weapon=i; }

// ── CAMERA ────────────────────────────────────────────────────────────────────
let camX=0, camY=0;
function updateCamera() {
  camX = Math.max(0, Math.min(WORLD_W-CW, P.x-CW/2));
  camY = Math.max(0, Math.min(WORLD_H-CH, P.y-CH/2));
}
const wx = x => x-camX;
const wy = y => y-camY;

// ── STATE ─────────────────────────────────────────────────────────────────────
const ST = {MENU:0, PLAYING:1, UPGRADE:2, GAMEOVER:3, PAUSED:4, SCORES:5};
let state = ST.MENU;
let level=1, score=0, gameWon=false;

// ── PLAYER ────────────────────────────────────────────────────────────────────
let P = {};
function resetPlayer() {
  P = {
    x:WORLD_W/2, y:WORLD_H/2, r:14,
    speed:200, speedBonus:0,
    hp:100, maxHp:100,
    weapon:0,
    weapons:[true,false,false,false],
    ammo:[Infinity,80,30,15],
    cooldown:0,
    dashTimer:0, dashCd:0,
    invTimer:0,
    angle:0,
    dmgMult:1,
    coins:0,
  };
}

// ── ENTITIES ──────────────────────────────────────────────────────────────────
let enemies=[], pBullets=[], eBullets=[], particles=[], pickups=[], obstacles=[];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const dist = (ax,ay,bx,by) => Math.hypot(ax-bx,ay-by);

function circleRect(cx,cy,cr,rx,ry,rw,rh) {
  const nx=Math.max(rx,Math.min(cx,rx+rw));
  const ny=Math.max(ry,Math.min(cy,ry+rh));
  return dist(cx,cy,nx,ny)<cr;
}
function pushOut(e,obs) {
  const nx=Math.max(obs.x,Math.min(e.x,obs.x+obs.w));
  const ny=Math.max(obs.y,Math.min(e.y,obs.y+obs.h));
  const dx=e.x-nx, dy=e.y-ny, d=Math.hypot(dx,dy);
  if (d>0 && d<e.r) { const p=(e.r-d)/d; e.x+=dx*p; e.y+=dy*p; }
  else if (d===0) e.y-=e.r;
}
function clampWorld(e) {
  e.x = Math.max(e.r, Math.min(WORLD_W-e.r, e.x));
  e.y = Math.max(e.r, Math.min(WORLD_H-e.r, e.y));
}
function obsCollide(e) {
  for (const o of obstacles) if (circleRect(e.x,e.y,e.r,o.x,o.y,o.w,o.h)) pushOut(e,o);
}

// ── PARTICLES ─────────────────────────────────────────────────────────────────
function spawnParts(x,y,col,n,spd,life=0.4) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2;
    const s=spd*(0.5+Math.random());
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,col,r:2+Math.random()*3});
  }
}
const spawnBlood  = (x,y) => spawnParts(x,y,'#cc2211',6,90);
const spawnSpark  = (x,y) => spawnParts(x,y,'#ffcc44',4,110,0.25);
const spawnBoom   = (x,y) => { spawnParts(x,y,'#ff6600',10,200); spawnParts(x,y,'#ffcc00',6,130); spawnParts(x,y,'#888',5,70); };
const spawnDash   = (x,y) => spawnParts(x,y,'#aaffaa',3,50,0.2);

// ── LEVEL GENERATION ──────────────────────────────────────────────────────────
function generateLevel(lvl) {
  enemies=[]; pBullets=[]; eBullets=[]; particles=[]; pickups=[];
  obstacles=[];

  // Obstacles — avoid center
  const nObs = BOSS_LEVELS.has(lvl) ? 8 : 10+lvl;
  for (let i=0;i<nObs;i++) {
    let ox,oy,ow,oh,t=0;
    do {
      ow=50+Math.random()*90; oh=50+Math.random()*90;
      ox=120+Math.random()*(WORLD_W-240-ow);
      oy=120+Math.random()*(WORLD_H-240-oh);
      t++;
    } while (t<30 && dist(ox+ow/2,oy+oh/2,WORLD_W/2,WORLD_H/2)<220);
    obstacles.push({x:ox,y:oy,w:ow,h:oh});
  }

  const hm = 1+(lvl-1)*0.22;
  if (BOSS_LEVELS.has(lvl)) {
    spawnBoss(lvl, hm);
  } else {
    const inf = Math.min(3+lvl*2, 20);
    const tnk = Math.max(0, Math.floor((lvl-2)/2));
    for (let i=0;i<inf;i++) spawnInfantry(hm);
    for (let i=0;i<tnk;i++) spawnTank(hm);
  }

  // Weapon drops
  if (lvl===2 && !P.weapons[1]) pickups.push({x:WORLD_W*0.8,y:WORLD_H*0.3,type:'smg'});
  if (lvl===3 && !P.weapons[2]) pickups.push({x:WORLD_W*0.2,y:WORLD_H*0.75,type:'shotgun'});
  if (lvl===4 && !P.weapons[3]) pickups.push({x:WORLD_W*0.8,y:WORLD_H*0.7,type:'sniper'});

  P.x=WORLD_W/2; P.y=WORLD_H/2;
  P.cooldown=0; P.invTimer=1.2;
}

function edgePos() {
  const s=Math.floor(Math.random()*4), m=120;
  if (s===0) return {x:m+Math.random()*(WORLD_W-m*2),y:m};
  if (s===1) return {x:WORLD_W-m,y:m+Math.random()*(WORLD_H-m*2)};
  if (s===2) return {x:m+Math.random()*(WORLD_W-m*2),y:WORLD_H-m};
  return {x:m,y:m+Math.random()*(WORLD_H-m*2)};
}

function spawnInfantry(hm) {
  const p=edgePos();
  enemies.push({x:p.x,y:p.y,r:12,type:'infantry',
    hp:Math.round(30*hm),maxHp:Math.round(30*hm),
    speed:65+level*5, angle:0, cooldown:1+Math.random()*2,
    patrolA:Math.random()*Math.PI*2});
}
function spawnTank(hm) {
  const p=edgePos();
  enemies.push({x:p.x,y:p.y,r:22,type:'tank',
    hp:Math.round(160*hm),maxHp:Math.round(160*hm),
    speed:38+level*2, angle:0, cooldown:2+Math.random()*2});
}
function spawnBoss(lvl,hm) {
  const ph=lvl===5?1:2;
  enemies.push({x:WORLD_W/2,y:160,r:46,type:'boss',
    hp:Math.round(700*ph*hm),maxHp:Math.round(700*ph*hm),
    speed:55, angle:0, cooldown:1.5,
    phase:ph, curPhase:1, spinAngle:0});
}

// ── SHOOTING ─────────────────────────────────────────────────────────────────
function playerShoot() {
  const w=WEAPONS[P.weapon];
  if (P.ammo[P.weapon]===0) return;
  const base=Math.atan2(mouse.y-wy(P.y), mouse.x-wx(P.x));
  for (let i=0;i<w.count;i++) {
    const a=base+(Math.random()-0.5)*w.spread*2;
    pBullets.push({x:P.x+Math.cos(a)*P.r,y:P.y+Math.sin(a)*P.r,
      vx:Math.cos(a)*w.spd,vy:Math.sin(a)*w.spd,
      dmg:w.dmg*P.dmgMult,r:P.weapon===1?3:(P.weapon===3?6:4),
      age:0,col:w.col});
  }
  if (P.ammo[P.weapon]!==Infinity) P.ammo[P.weapon]--;
  P.cooldown=w.cd;
}

function enemyFire(e, dmg, spd, spread, r) {
  const a=Math.atan2(P.y-e.y,P.x-e.x)+(Math.random()-0.5)*spread*2;
  eBullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,
    vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,dmg,r,age:0});
}

// ── UPDATE ────────────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  if (P.dashCd>0) P.dashCd-=dt;
  if (P.dashTimer>0) P.dashTimer-=dt;
  if (P.invTimer>0) P.invTimer-=dt;
  if (P.cooldown>0) P.cooldown-=dt;

  let mx=0,my=0;
  if (keys['KeyW']||keys['ArrowUp'])    my-=1;
  if (keys['KeyS']||keys['ArrowDown'])  my+=1;
  if (keys['KeyA']||keys['ArrowLeft'])  mx-=1;
  if (keys['KeyD']||keys['ArrowRight']) mx+=1;
  if (mx||my) { const l=Math.hypot(mx,my); mx/=l; my/=l; }

  // Dash
  if (keys['Space'] && P.dashCd<=0 && (mx||my)) {
    P.dashTimer=0.18; P.dashCd=1.2; P.invTimer=0.18;
    spawnDash(P.x,P.y);
  }
  const spd=(P.speed+P.speedBonus)*(P.dashTimer>0?2.6:1);
  P.x+=mx*spd*dt; P.y+=my*spd*dt;

  clampWorld(P); obsCollide(P);
  P.angle=Math.atan2(mouse.y-wy(P.y), mouse.x-wx(P.x));
  if (mouse.down && P.cooldown<=0) playerShoot();

  // Pickups
  for (let i=pickups.length-1;i>=0;i--) {
    const pk=pickups[i];
    if (dist(P.x,P.y,pk.x,pk.y)<P.r+16) { applyPickup(pk); pickups.splice(i,1); }
  }
}

function applyPickup(pk) {
  if (pk.type==='health')  { P.hp=Math.min(P.maxHp,P.hp+40); spawnParts(pk.x,pk.y,'#22cc44',6,60); }
  if (pk.type==='smg')     { P.weapons[1]=true; P.weapon=1; }
  if (pk.type==='shotgun') { P.weapons[2]=true; P.weapon=2; }
  if (pk.type==='sniper')  { P.weapons[3]=true; P.weapon=3; }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (e.hp<=0) continue;
    if (e.type==='infantry') aiInfantry(e,dt);
    else if (e.type==='tank') aiTank(e,dt);
    else if (e.type==='boss') aiBoss(e,dt);
    obsCollide(e); clampWorld(e);

    // Contact damage
    if (P.invTimer<=0 && dist(P.x,P.y,e.x,e.y)<P.r+e.r) {
      const dmg=e.type==='boss'?18:(e.type==='tank'?14:8);
      P.hp-=dmg; P.invTimer=0.5; spawnBlood(P.x,P.y);
      if (P.hp<=0) { P.hp=0; endGame(); return; }
    }
  }
}

function aiInfantry(e,dt) {
  e.cooldown-=dt;
  const dx=P.x-e.x, dy=P.y-e.y, d=Math.hypot(dx,dy);
  e.angle=Math.atan2(dy,dx);
  if (d<380) {
    if (d>90) { e.x+=dx/d*e.speed*dt; e.y+=dy/d*e.speed*dt; }
    if (e.cooldown<=0 && d<320) { enemyFire(e,8,310,0.14,5); e.cooldown=1.4+Math.random(); }
  } else {
    e.patrolA+=(Math.random()-0.5)*0.6;
    e.x+=Math.cos(e.patrolA)*e.speed*0.4*dt;
    e.y+=Math.sin(e.patrolA)*e.speed*0.4*dt;
  }
}
function aiTank(e,dt) {
  e.cooldown-=dt;
  const dx=P.x-e.x, dy=P.y-e.y, d=Math.hypot(dx,dy);
  e.angle=Math.atan2(dy,dx);
  if (d>100) { e.x+=dx/d*e.speed*dt; e.y+=dy/d*e.speed*dt; }
  if (e.cooldown<=0) {
    for (let i=0;i<3;i++) setTimeout(()=>{ if(e.hp>0) enemyFire(e,16,290,0.06,6); },i*220);
    e.cooldown=3+Math.random();
  }
}
function aiBoss(e,dt) {
  e.cooldown-=dt;
  e.spinAngle+=dt*(e.curPhase===2?2:1.2);

  // Phase 2 transition
  if (e.curPhase===1 && e.hp<e.maxHp*0.5) {
    e.curPhase=2; e.speed*=1.5;
    spawnBoom(e.x,e.y); spawnBoom(e.x+50,e.y-30);
  }

  const dx=P.x-e.x, dy=P.y-e.y, d=Math.hypot(dx,dy);
  e.angle=Math.atan2(dy,dx);
  if (d>130) { e.x+=dx/d*e.speed*dt; e.y+=dy/d*e.speed*dt; }

  if (e.cooldown<=0) {
    const shots=e.curPhase===2?8:5;
    for (let i=0;i<shots;i++) {
      const a=e.angle+(i-(shots-1)/2)*0.22;
      eBullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,
        vx:Math.cos(a)*300,vy:Math.sin(a)*300,dmg:14,r:8,age:0});
    }
    if (e.curPhase===2) {
      // Spiral burst
      for (let i=0;i<8;i++) {
        const a=e.spinAngle+(i/8)*Math.PI*2;
        eBullets.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,
          vx:Math.cos(a)*240,vy:Math.sin(a)*240,dmg:12,r:7,age:0});
      }
    }
    e.cooldown=e.curPhase===2?1.2:2;
  }
}

function updateBullets(dt) {
  const TTL=2.5;
  // Player bullets
  for (let i=pBullets.length-1;i>=0;i--) {
    const b=pBullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.age+=dt;
    let hit=false;
    if (b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H||b.age>TTL) { hit=true; }
    if (!hit) for (const o of obstacles) if (b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h) { spawnSpark(b.x,b.y); hit=true; break; }
    if (!hit) {
      for (let j=enemies.length-1;j>=0;j--) {
        const e=enemies[j];
        if (e.hp<=0) continue;
        if (dist(b.x,b.y,e.x,e.y)<e.r+b.r) {
          e.hp-=b.dmg; spawnBlood(b.x,b.y); hit=true;
          if (e.hp<=0) killEnemy(j);
          break;
        }
      }
    }
    if (hit) pBullets.splice(i,1);
  }
  // Enemy bullets
  for (let i=eBullets.length-1;i>=0;i--) {
    const b=eBullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.age+=dt;
    let hit=false;
    if (b.x<0||b.x>WORLD_W||b.y<0||b.y>WORLD_H||b.age>TTL) { hit=true; }
    if (!hit) for (const o of obstacles) if (b.x>o.x&&b.x<o.x+o.w&&b.y>o.y&&b.y<o.y+o.h) { hit=true; break; }
    if (!hit && P.invTimer<=0 && dist(b.x,b.y,P.x,P.y)<P.r+b.r) {
      P.hp-=b.dmg; P.invTimer=0.28; spawnBlood(P.x,P.y); hit=true;
      if (P.hp<=0) { P.hp=0; endGame(); }
    }
    if (hit) eBullets.splice(i,1);
  }
}

function killEnemy(j) {
  const e=enemies[j];
  const isBoss=e.type==='boss';
  score += isBoss?600:(e.type==='tank'?90:28);
  P.coins += isBoss?120:(e.type==='tank'?25:8);
  if (isBoss) { spawnBoom(e.x,e.y); spawnBoom(e.x-40,e.y+30); }
  else { spawnBlood(e.x,e.y); if(Math.random()<0.18) pickups.push({x:e.x,y:e.y,type:'health'}); }
  enemies.splice(j,1);
  if (enemies.filter(en=>en.hp>0).length===0) {
    setTimeout(()=>{ if(state===ST.PLAYING) levelComplete(); },600);
  }
}

function updateParticles(dt) {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.vx*=0.91; p.vy*=0.91;
    p.life-=dt;
    if (p.life<=0) particles.splice(i,1);
  }
}

// ── LEVEL FLOW ────────────────────────────────────────────────────────────────
function levelComplete() {
  score+=level*120;
  if (level>=TOTAL_LEVELS) { saveScore(score); gameWon=true; state=ST.GAMEOVER; return; }
  level++;
  buildUpgrades();
  state=ST.UPGRADE;
}
function endGame() { saveScore(score); gameWon=false; state=ST.GAMEOVER; }

// ── UPGRADES ─────────────────────────────────────────────────────────────────
let upgradeOpts=[];
function buildUpgrades() {
  upgradeOpts=[...UPGRADE_DEFS].sort(()=>Math.random()-0.5).slice(0,3);
}
function applyUpgrade(o) {
  if (P.coins<o.cost) return;
  P.coins-=o.cost;
  if (o.key==='hp')    { P.maxHp+=40; P.hp=P.maxHp; }
  if (o.key==='dmg')   { P.dmgMult+=0.25; }
  if (o.key==='speed') { P.speedBonus+=40; }
  if (o.key==='ammo')  { P.ammo=[Infinity,120,50,25]; }
  if (o.key==='heal')  { P.hp=Math.min(P.maxHp,P.hp+60); }
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
const LB_KEY='deadzone_v1_scores';
function getScores() { try{return JSON.parse(localStorage.getItem(LB_KEY))||[];}catch{return[];} }
function saveScore(s) {
  const arr=getScores(); arr.push({s,d:new Date().toLocaleDateString()});
  arr.sort((a,b)=>b.s-a.s);
  localStorage.setItem(LB_KEY,JSON.stringify(arr.slice(0,10)));
}

// ── DRAW HELPERS ──────────────────────────────────────────────────────────────
function btnHit(x,y,w,h) { return mouse.x>x-w/2&&mouse.x<x+w/2&&mouse.y>y-h/2&&mouse.y<y+h/2; }
function btnClick(x,y,w,h) { return mouse.clicked&&btnHit(x,y,w,h); }
function drawBtn(x,y,w,h,txt,bg,hov,tc='#fff') {
  const hot=btnHit(x,y,w,h);
  ctx.fillStyle=hot?hov:bg;
  ctx.fillRect(x-w/2,y-h/2,w,h);
  ctx.strokeStyle=hot?'#fff':'#555';
  ctx.lineWidth=2; ctx.strokeRect(x-w/2,y-h/2,w,h);
  ctx.fillStyle=tc; ctx.font='bold 15px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(txt,x,y); ctx.textBaseline='alphabetic';
}

// ── DRAW WORLD ────────────────────────────────────────────────────────────────
function drawBg() {
  ctx.fillStyle=COL.bg; ctx.fillRect(0,0,CW,CH);
  const ts=64;
  ctx.fillStyle=COL.bgTile;
  for (let x=-(camX%ts);x<CW;x+=ts)
    for (let y=-(camY%ts);y<CH;y+=ts)
      ctx.fillRect(x+3,y+3,ts-6,ts-6);
  // World border
  ctx.strokeStyle='#222'; ctx.lineWidth=6;
  ctx.strokeRect(wx(0),wy(0),WORLD_W,WORLD_H);
}

function drawObstacles() {
  for (const o of obstacles) {
    const x=wx(o.x),y=wy(o.y);
    if (x+o.w<0||x>CW||y+o.h<0||y>CH) continue;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x+5,y+5,o.w,o.h);
    ctx.fillStyle=COL.wall; ctx.fillRect(x,y,o.w,o.h);
    ctx.fillStyle=COL.wallHi; ctx.fillRect(x,y,o.w,7); ctx.fillRect(x,y,7,o.h);
    ctx.fillStyle=COL.wallSh; ctx.fillRect(x,y+o.h-5,o.w,5); ctx.fillRect(x+o.w-5,y,5,o.h);
    // Sandbag lines
    ctx.fillStyle='rgba(0,0,0,0.15)';
    for (let sy=y+14;sy<y+o.h-8;sy+=14) ctx.fillRect(x+4,sy,o.w-8,3);
  }
}

function drawPickups() {
  const t=performance.now()/1000;
  for (const pk of pickups) {
    const x=wx(pk.x),y=wy(pk.y)+Math.sin(t*3)*4;
    ctx.save(); ctx.translate(x,y);
    ctx.shadowBlur=12; ctx.shadowColor=pk.type==='health'?'#ff4444':'#ffcc44';
    if (pk.type==='health') {
      ctx.fillStyle='#cc2222'; ctx.fillRect(-10,-4,20,8); ctx.fillRect(-4,-10,8,20);
      ctx.fillStyle='#ff5555'; ctx.fillRect(-8,-2,16,4); ctx.fillRect(-2,-8,4,16);
    } else {
      ctx.fillStyle='#886633'; ctx.fillRect(-14,-9,28,18);
      ctx.fillStyle='#aa8844'; ctx.fillRect(-12,-7,24,5);
      ctx.fillStyle='#ffcc44'; ctx.font='bold 9px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pk.type.slice(0,3).toUpperCase(),0,4);
    }
    ctx.restore();
  }
}

function drawSoldier(x,y,angle,bc,dc,r,flash) {
  ctx.save(); ctx.translate(x,y);
  if (flash && Math.floor(performance.now()/90)%2) ctx.globalAlpha=0.35;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(3,4,r+2,r*0.7,0,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle=bc; ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  // Helmet
  ctx.fillStyle=dc; ctx.beginPath(); ctx.arc(0,-1,r*0.68,Math.PI,0); ctx.fill();
  // Belt
  ctx.fillStyle=dc; ctx.fillRect(-r,0,r*2,4);
  // Gun
  ctx.rotate(angle);
  ctx.fillStyle=dc; ctx.fillRect(r*0.2,-4,r*0.85,8);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(r*0.9,-3,r*0.65,6);
  // Muzzle hole
  ctx.fillStyle='#111'; ctx.fillRect(r*1.52,-2,4,4);
  ctx.rotate(-angle);
  // Eye
  const ex=Math.cos(angle)*r*0.28, ey=Math.sin(angle)*r*0.28;
  ctx.fillStyle='#fff'; ctx.fillRect(ex-3,ey-3,7,7);
  ctx.fillStyle='#000'; ctx.fillRect(ex-1,ey-1,4,4);
  ctx.restore();
}

function drawTankEntity(x,y,angle,bc,dc) {
  ctx.save(); ctx.translate(x,y);
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fillRect(-26,-14,52+5,28+5);
  // Hull
  ctx.fillStyle=bc; ctx.fillRect(-26,-15,52,30);
  // Tracks
  ctx.fillStyle=dc;
  ctx.fillRect(-26,-18,52,7); ctx.fillRect(-26,11,52,7);
  ctx.fillStyle='#222';
  for (let i=-22;i<26;i+=10) { ctx.fillRect(i,-18,5,7); ctx.fillRect(i,11,5,7); }
  // Turret
  ctx.fillStyle='#6a7a6a'; ctx.beginPath(); ctx.arc(0,0,15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=dc; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  // Barrel
  ctx.rotate(angle);
  ctx.fillStyle='#3a4a3a'; ctx.fillRect(12,-6,24,12);
  ctx.fillStyle='#222'; ctx.fillRect(32,-4,10,8);
  ctx.restore();
}

function drawBossEntity(e) {
  const x=wx(e.x),y=wy(e.y);
  const phase2=e.curPhase===2;
  const pulse=Math.sin(performance.now()/180)*4;
  ctx.save(); ctx.translate(x,y);
  ctx.shadowBlur=20; ctx.shadowColor=phase2?'#ff2222':'#882222';
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.ellipse(5,5,e.r+6,e.r+2,0,0,Math.PI*2); ctx.fill();
  // Body
  ctx.fillStyle=phase2?'#aa2020':COL.boss;
  ctx.beginPath(); ctx.arc(0,0,e.r+pulse,0,Math.PI*2); ctx.fill();
  // Armor plates
  ctx.fillStyle=COL.bossDk;
  for (let i=0;i<6;i++) {
    const a=(i/6)*Math.PI*2+e.spinAngle*0.3;
    ctx.save(); ctx.rotate(a);
    ctx.fillRect(e.r*0.35,-5,e.r*0.5,10);
    ctx.restore();
  }
  // Turret
  ctx.fillStyle='#444'; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333'; ctx.beginPath(); ctx.arc(0,0,13,0,Math.PI*2); ctx.fill();
  // Barrel
  ctx.rotate(e.angle);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(18,-8,32,16);
  ctx.fillStyle='#111'; ctx.fillRect(44,-5,14,10);
  ctx.restore();
}

function drawEntities() {
  for (const e of enemies) {
    if (e.hp<=0) continue;
    const x=wx(e.x),y=wy(e.y);
    if (x<-80||x>CW+80||y<-80||y>CH+80) continue;
    if (e.type==='infantry') drawSoldier(x,y,e.angle,COL.infantry,COL.infantryDk,e.r,false);
    else if (e.type==='tank') drawTankEntity(x,y,e.angle,COL.tank,COL.tankDk);
    else drawBossEntity(e);
    // HP bar (non-boss)
    if (e.type!=='boss') {
      const bw=e.r*2+6,bh=5,bx=x-bw/2,by=y-e.r-12;
      ctx.fillStyle=COL.hpBg; ctx.fillRect(bx,by,bw,bh);
      const pct=e.hp/e.maxHp;
      ctx.fillStyle=pct>0.5?COL.hp:'#cc6600';
      ctx.fillRect(bx,by,bw*pct,bh);
    }
  }
}

function drawPlayer() {
  if (P.dashTimer>0) spawnDash(P.x,P.y);
  drawSoldier(wx(P.x),wy(P.y),P.angle,COL.player,COL.playerDk,P.r,P.invTimer>0);
}

function drawBullets() {
  ctx.shadowBlur=8;
  for (const b of pBullets) {
    ctx.shadowColor=b.col; ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.arc(wx(b.x),wy(b.y),b.r,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowColor=COL.enemyBullet; ctx.fillStyle=COL.enemyBullet;
  for (const b of eBullets) {
    ctx.beginPath(); ctx.arc(wx(b.x),wy(b.y),b.r,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0;
}

function drawParticles() {
  for (const p of particles) {
    const a=Math.max(0,p.life/p.maxLife);
    ctx.globalAlpha=a; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(wx(p.x),wy(p.y),p.r*a,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawHUD() {
  // HP bar
  const hbw=200,hbh=18,hbx=18,hby=CH-44;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(hbx-2,hby-2,hbw+4,hbh+4);
  ctx.fillStyle=COL.hpBg; ctx.fillRect(hbx,hby,hbw,hbh);
  const hpR=P.hp/P.maxHp;
  ctx.fillStyle=hpR>0.5?COL.hp:(hpR>0.25?'#cc6600':COL.hpLow);
  ctx.fillRect(hbx,hby,hbw*hpR,hbh);
  ctx.fillStyle='#fff'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(P.hp)} / ${P.maxHp}`,hbx+hbw/2,hby+13);
  ctx.fillStyle='#aaa'; ctx.font='10px monospace'; ctx.textAlign='left';
  ctx.fillText('HP',hbx,hby-4);

  // Coins
  ctx.fillStyle=COL.coin; ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(`$ ${P.coins}`,18,CH-54);

  // Dash
  ctx.fillStyle=P.dashCd<=0?'#88ff88':'#666'; ctx.font='10px monospace';
  ctx.fillText(P.dashCd<=0?'[SPACE] DASH':`[SPACE] ${P.dashCd.toFixed(1)}s`,18,52);

  // Enemy count
  const alive=enemies.filter(e=>e.hp>0).length;
  ctx.fillStyle='#ff5555'; ctx.font='bold 13px monospace'; ctx.textAlign='left';
  ctx.fillText(`ENEMIES: ${alive}`,18,30);

  // Score / level
  ctx.fillStyle='#fff'; ctx.font='bold 14px monospace'; ctx.textAlign='right';
  ctx.fillText(`SCORE: ${score}`,CW-16,28);
  ctx.fillStyle='#aaa'; ctx.font='11px monospace';
  ctx.fillText(`LEVEL ${level} / ${TOTAL_LEVELS}`,CW-16,46);

  // Weapon bar
  const wbx=CW/2-130;
  for (let i=0;i<4;i++) {
    const x=wbx+i*66,y=CH-52,w=60,h=44;
    ctx.fillStyle=P.weapons[i]?(P.weapon===i?'rgba(70,130,70,0.85)':'rgba(35,45,35,0.85)'):'rgba(18,18,18,0.7)';
    ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=P.weapon===i?'#88ff88':'#3a4a3a'; ctx.lineWidth=2;
    ctx.strokeRect(x,y,w,h);
    ctx.textAlign='center';
    if (P.weapons[i]) {
      ctx.fillStyle=WEAPONS[i].col; ctx.font='bold 9px monospace';
      ctx.fillText(WEAPONS[i].name,x+w/2,y+14);
      ctx.fillStyle='#aaa'; ctx.font='8px monospace';
      ctx.fillText(P.ammo[i]===Infinity?'∞':String(P.ammo[i]),x+w/2,y+26);
      ctx.fillStyle='#555'; ctx.fillText(`[${i+1}]`,x+w/2,y+38);
    } else {
      ctx.fillStyle='#3a3a3a'; ctx.font='8px monospace'; ctx.fillText('LOCKED',x+w/2,y+24);
    }
  }

  // Boss HP bar
  const boss=enemies.find(e=>e.type==='boss'&&e.hp>0);
  if (boss) {
    const bw=480,bh=22,bx=CW/2-bw/2,by=8;
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(bx-4,by-4,bw+8,bh+8);
    ctx.fillStyle='#2a0000'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=boss.curPhase===2?'#ff2222':'#cc0000';
    ctx.fillRect(bx,by,bw*(boss.hp/boss.maxHp),bh);
    ctx.fillStyle='#fff'; ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`COMMANDER${boss.curPhase===2?' [PHASE 2]':''} — ${Math.ceil(boss.hp)} / ${boss.maxHp}`,CW/2,by+bh/2);
    ctx.textBaseline='alphabetic';
  }

  // ESC hint
  ctx.fillStyle='#444'; ctx.font='10px monospace'; ctx.textAlign='right';
  ctx.fillText('[ESC] PAUSE',CW-16,CH-8);
}

// ── SCREENS ───────────────────────────────────────────────────────────────────
function drawMenu() {
  ctx.fillStyle='#151008'; ctx.fillRect(0,0,CW,CH);
  // Grid overlay
  ctx.strokeStyle='rgba(60,50,30,0.4)'; ctx.lineWidth=1;
  for (let x=0;x<CW;x+=40) { ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke(); }
  for (let y=0;y<CH;y+=40) { ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke(); }

  ctx.shadowBlur=30; ctx.shadowColor='#cc3311';
  ctx.fillStyle='#dd4422'; ctx.font='bold 80px monospace'; ctx.textAlign='center';
  ctx.fillText('DEAD ZONE',CW/2,140);
  ctx.shadowBlur=0;

  ctx.fillStyle='#887755'; ctx.font='18px monospace';
  ctx.fillText('TOP-DOWN MILITARY SHOOTER',CW/2,178);

  ctx.fillStyle='#555'; ctx.font='13px monospace';
  ['WASD — Move       MOUSE — Aim & Shoot',
   'SPACE — Dash roll  1/2/3/4 — Switch weapon',
   'Eliminate all enemies to advance. Bosses at levels 5 & 10.']
  .forEach((l,i)=>ctx.fillText(l,CW/2,228+i*22));

  drawBtn(CW/2,340,220,52,'▶  START GAME','#1a5a1a','#2a8a2a');
  drawBtn(CW/2,410,220,48,'LEADERBOARD','#1a1a5a','#2a2a8a');
  drawBtn(CW/2,472,220,40,'HOW TO PLAY','#333','#555');

  // Decorative soldiers
  drawSoldier(90,CH/2,0,COL.player,COL.playerDk,18,false);
  drawSoldier(CW-90,CH/2,Math.PI,COL.infantry,COL.infantryDk,18,false);
  drawTankEntity(CW-90,CH/2+80,Math.PI,COL.tank,COL.tankDk);
}

function drawPause() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
  ctx.fillText('PAUSED',CW/2,220);
  ctx.fillStyle='#888'; ctx.font='16px monospace';
  ctx.fillText('Press ESC to resume',CW/2,270);
  drawBtn(CW/2,360,220,52,'RESUME','#1a5a1a','#2a8a2a');
  drawBtn(CW/2,428,220,44,'QUIT TO MENU','#5a1a1a','#8a2a2a');
}

function drawUpgrade() {
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,CW,CH);

  ctx.fillStyle='#88ff88'; ctx.font='bold 34px monospace'; ctx.textAlign='center';
  ctx.fillText(`LEVEL ${level-1} COMPLETE!`,CW/2,62);

  ctx.fillStyle='#ffcc44'; ctx.font='bold 16px monospace';
  ctx.fillText(`COINS: $${P.coins}    SCORE: ${score}`,CW/2,96);
  ctx.fillStyle='#777'; ctx.font='13px monospace';
  ctx.fillText('Click upgrades to purchase. Advance when ready.',CW/2,122);

  upgradeOpts.forEach((o,i)=>{
    const ox=100+i*240,oy=148,ow=210,oh=220;
    const hot=mouse.x>ox&&mouse.x<ox+ow&&mouse.y>oy&&mouse.y<oy+oh;
    const can=P.coins>=o.cost;
    ctx.fillStyle=hot&&can?'rgba(70,110,70,0.92)':(can?'rgba(38,52,38,0.88)':'rgba(24,24,24,0.78)');
    ctx.fillRect(ox,oy,ow,oh);
    ctx.strokeStyle=hot&&can?'#88ff88':(can?'#3a6a3a':'#2a2a2a'); ctx.lineWidth=2;
    ctx.strokeRect(ox,oy,ow,oh);

    const icons=['🛡️','🔥','👟','📦','💊'];
    const idx=UPGRADE_DEFS.indexOf(o);
    ctx.font='36px monospace'; ctx.textAlign='center';
    ctx.fillStyle='#fff'; ctx.fillText(icons[idx]??'⭐',ox+ow/2,oy+52);

    ctx.fillStyle='#88ff88'; ctx.font='bold 12px monospace';
    ctx.fillText(o.label,ox+ow/2,oy+78);

    ctx.fillStyle='#aaa'; ctx.font='11px monospace';
    o.desc.split('\n').forEach((l,li)=>ctx.fillText(l,ox+ow/2,oy+104+li*18));

    ctx.fillStyle=can?'#ffcc44':'#663333'; ctx.font='bold 18px monospace';
    ctx.fillText(`$${o.cost}`,ox+ow/2,oy+170);
    if (!can) { ctx.fillStyle='#883333'; ctx.font='10px monospace'; ctx.fillText('NEED MORE COINS',ox+ow/2,oy+190); }

    if (mouse.clicked && hot && can) applyUpgrade(o);
  });

  drawBtn(CW/2,418,230,54,'NEXT LEVEL →','#1a2a5a','#2a4a8a');
  if (btnClick(CW/2,418,230,54)) { generateLevel(level); state=ST.PLAYING; }
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,0,CW,CH);
  ctx.shadowBlur=30; ctx.shadowColor=gameWon?'#44ff44':'#ff2222';
  ctx.fillStyle=gameWon?'#66ff66':'#ff4444'; ctx.font='bold 54px monospace'; ctx.textAlign='center';
  ctx.fillText(gameWon?'MISSION COMPLETE!':'GAME OVER',CW/2,130);
  ctx.shadowBlur=0;

  ctx.fillStyle='#ffcc44'; ctx.font='bold 22px monospace';
  ctx.fillText(`FINAL SCORE: ${score}`,CW/2,188);
  ctx.fillStyle='#888'; ctx.font='14px monospace';
  ctx.fillText(`Reached Level ${level} / ${TOTAL_LEVELS}`,CW/2,220);

  // Scores
  const scores=getScores();
  ctx.fillStyle='#aaa'; ctx.font='bold 13px monospace'; ctx.fillText('TOP SCORES',CW/2,265);
  scores.slice(0,5).forEach((s,i)=>{
    ctx.fillStyle=i===0?'#ffcc44':(i===1?'#c0c0c0':(i===2?'#cd7f32':'#666'));
    ctx.font=`${i<3?'bold ':''}13px monospace`;
    ctx.fillText(`#${i+1}  ${s.s}  —  ${s.d}`,CW/2,290+i*22);
  });

  drawBtn(CW/2,445,230,52,'PLAY AGAIN','#1a5a1a','#2a8a2a');
  drawBtn(CW/2,510,230,44,'MAIN MENU','#333','#555');
  if (btnClick(CW/2,445,230,52)) startGame();
  if (btnClick(CW/2,510,230,44)) state=ST.MENU;
}

function drawScores() {
  ctx.fillStyle='#08080f'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#ffcc44'; ctx.font='bold 40px monospace'; ctx.textAlign='center';
  ctx.fillText('LEADERBOARD',CW/2,70);
  const scores=getScores();
  if (!scores.length) {
    ctx.fillStyle='#444'; ctx.font='16px monospace'; ctx.fillText('No scores yet.',CW/2,200);
  } else {
    scores.slice(0,10).forEach((s,i)=>{
      const y=120+i*42;
      ctx.fillStyle=i===0?'#ffcc44':(i===1?'#c0c0c0':(i===2?'#cd7f32':'#555'));
      ctx.font=`bold ${i<3?20:16}px monospace`;
      ctx.fillText(`#${i+1}   ${s.s}`,CW/2,y);
      ctx.fillStyle='#444'; ctx.font='11px monospace'; ctx.fillText(s.d,CW/2,y+16);
    });
  }
  drawBtn(CW/2,540,200,48,'← BACK','#333','#555');
  if (btnClick(CW/2,540,200,48)) state=ST.MENU;
}

function drawHowTo() {
  // reuse gameover layout for "how to play" — simple overlay
  // (triggered from menu but we handle via state machine; simplest: just toggle to menu)
}

// ── GAME INIT ─────────────────────────────────────────────────────────────────
function startGame() {
  resetPlayer(); level=1; score=0; gameWon=false;
  generateLevel(1); state=ST.PLAYING;
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
let dt=0, lastT=0;
function loop(ts) {
  dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  ctx.clearRect(0,0,CW,CH);

  if (state===ST.MENU) {
    drawMenu();
    if (btnClick(CW/2,340,220,52)) startGame();
    if (btnClick(CW/2,410,220,48)) state=ST.SCORES;
    if (btnClick(CW/2,472,220,40)) { /* how to play — inline */ }
  } else if (state===ST.PLAYING) {
    updateCamera();
    updatePlayer(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateParticles(dt);
    drawBg(); drawObstacles(); drawPickups();
    drawParticles(); drawBullets(); drawEntities(); drawPlayer();
    drawHUD();
  } else if (state===ST.PAUSED) {
    drawBg(); drawObstacles(); drawPickups();
    drawParticles(); drawBullets(); drawEntities(); drawPlayer();
    drawHUD(); drawPause();
    if (btnClick(CW/2,360,220,52)) state=ST.PLAYING;
    if (btnClick(CW/2,428,220,44)) state=ST.MENU;
  } else if (state===ST.UPGRADE) {
    drawUpgrade();
  } else if (state===ST.GAMEOVER) {
    drawGameOver();
  } else if (state===ST.SCORES) {
    drawScores();
  }

  mouse.clicked=false;
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
